# ==============================================
# SBADSS — Development Profile
# ==============================================
spring.application.name=sbadss
server.port=8080

# ==============================================
# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:sbadssdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JPA / Hibernate
# ==============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Cache (Disabled for H2 Mode)
# ==============================================
spring.cache.type=none

# ==============================================
# AI Microservice URL
# ==============================================
sbadss.ai.service.url=http://localhost:8000

# ==============================================
# Mail (Gmail SMTP — use App Password)
# ==============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:sbadss.noreply@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ==============================================
# JWT Configuration
# ==============================================
sbadss.jwt.secret=${JWT_SECRET:sbadss-super-secret-key-must-be-at-least-256-bits-long-for-hs256}
sbadss.jwt.expiration=86400000

# ==============================================
# Report Output Directory
# ==============================================
sbadss.report.output.dir=./reports
sbadss.report.email.enabled=false

# ==============================================
# Scheduler
# ==============================================
sbadss.scheduler.report.daily.cron=0 0 8 * * *
sbadss.scheduler.report.weekly.cron=0 0 8 * * MON
sbadss.scheduler.report.monthly.cron=0 0 8 1 * *

# ==============================================
# Logging
# ==============================================
logging.level.com.sbadss=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

