# ==============================================
# SBADSS — Production Profile
# All values from environment variables ONLY
# ==============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis

sbadss.ai.service.url=${AI_SERVICE_URL}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

sbadss.jwt.secret=${JWT_SECRET}
sbadss.jwt.expiration=${JWT_EXPIRATION:86400000}

sbadss.report.output.dir=${REPORT_OUTPUT_DIR:/app/reports}
sbadss.report.email.enabled=true

sbadss.scheduler.report.daily.cron=0 0 8 * * *
sbadss.scheduler.report.weekly.cron=0 0 8 * * MON
sbadss.scheduler.report.monthly.cron=0 0 8 1 * *

logging.level.root=WARN
logging.level.com.sbadss=INFO
